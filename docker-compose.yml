services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-trader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_trader}
      POSTGRES_USER: ${POSTGRES_USER:-ai_trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_now}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: service/server/Dockerfile
    container_name: ai-trader-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ai_trader:change_me_now@postgres:5432/ai_trader}
      CLAWTRADER_CORS_ORIGINS: ${CLAWTRADER_CORS_ORIGINS:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/claw/agents/count >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: service/server/Dockerfile
    container_name: ai-trader-worker
    restart: unless-stopped
    command: ["python", "worker.py"]
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ai_trader:change_me_now@postgres:5432/ai_trader}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: service/frontend/Dockerfile
    container_name: ai-trader-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"

volumes:
  postgres_data:
